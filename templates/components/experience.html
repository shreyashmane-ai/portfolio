<section id="experience" class="section section-experience" data-section="experience">
  <div class="container px-3 px-lg-5">
    <header class="section-header reveal-up">
      <span class="section-label">Sector 04</span>
      <h2 class="section-title">Experience</h2>
      <p class="section-desc">Milestones across the multiverse of backend engineering.</p>
    </header>

    <div class="timeline">
      {% for job in experience %}
      <article class="timeline-item reveal-up" style="--reveal-delay: {{ loop.index0 * 0.1 }}s">
        <div class="timeline-node" aria-hidden="true">
          <span class="timeline-pulse"></span>
        </div>
        <div class="timeline-card glass-panel energy-border">
          <div class="timeline-meta">
            <time class="timeline-period">{{ job.period }}</time>
            <span class="timeline-location"><i class="bi bi-geo-alt" aria-hidden="true"></i> {{ job.location }}</span>
          </div>
          <h3 class="timeline-role">{{ job.role }}</h3>
          <p class="timeline-company">{{ job.company }}</p>
          <ul class="timeline-highlights">
            {% for highlight in job.highlights or [] %}
            <li>{{ highlight }}</li>
            {% endfor %}
          </ul>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
