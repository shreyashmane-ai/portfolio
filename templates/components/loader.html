<div id="thunder-loader" class="thunder-loader" role="status" aria-live="polite" aria-label="Loading portfolio">
  <div class="loader-storm" aria-hidden="true"></div>
  <div class="loader-lightning loader-lightning--1" aria-hidden="true"></div>
  <div class="loader-lightning loader-lightning--2" aria-hidden="true"></div>
  <div class="loader-lightning loader-lightning--3" aria-hidden="true"></div>
  <div class="loader-content">
    <div class="loader-logo">
      <span class="loader-ring"></span>
      <i class="bi bi-lightning-charge-fill" aria-hidden="true"></i>
    </div>
    <p class="loader-text" id="loader-text">Initializing Thunder Systems...</p>
    <div class="loader-bar" aria-hidden="true">
      <div class="loader-bar-fill" id="loader-bar-fill"></div>
    </div>
    <span class="loader-percent" id="loader-percent">0%</span>
  </div>
</div>
