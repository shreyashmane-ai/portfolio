<aside class="thunder-sidebar d-none d-xl-flex" id="thunder-sidebar" aria-label="Section navigation">
  <div class="sidebar-inner glass-panel">
    <div class="sidebar-status">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="status-label">Systems Online</span>
    </div>
    <nav class="sidebar-nav">
      {% if request.path.startswith('/admin') %}
      <a href="{{ url_for('admin.index') }}" class="sidebar-link{% if request.path == '/admin' %} active{% endif %}" aria-label="Admin dashboard">
        <i class="bi bi-speedometer2" aria-hidden="true"></i>
        <span>Dashboard</span>
      </a>
      <a href="{{ url_for('admin.site_settings') }}" class="sidebar-link{% if request.path == '/admin/site' %} active{% endif %}" aria-label="Site settings">
        <i class="bi bi-gear-fill" aria-hidden="true"></i>
        <span>Site settings</span>
      </a>
      <a href="{{ url_for('admin.about_settings') }}" class="sidebar-link{% if request.path == '/admin/about' %} active{% endif %}" aria-label="About section">
        <i class="bi bi-info-circle-fill" aria-hidden="true"></i>
        <span>About section</span>
      </a>
      <a href="{{ url_for('admin.project_list') }}" class="sidebar-link{% if request.path.startswith('/admin/projects') %} active{% endif %}" aria-label="Projects">
        <i class="bi bi-kanban-fill" aria-hidden="true"></i>
        <span>Projects</span>
      </a>
      <a href="{{ url_for('admin.experience_list') }}" class="sidebar-link{% if request.path.startswith('/admin/experience') %} active{% endif %}" aria-label="Experience">
        <i class="bi bi-briefcase-fill" aria-hidden="true"></i>
        <span>Experience</span>
      </a>
      <a href="{{ url_for('admin.skill_list') }}" class="sidebar-link{% if request.path.startswith('/admin/skills') %} active{% endif %}" aria-label="Skills">
        <i class="bi bi-award-fill" aria-hidden="true"></i>
        <span>Skills</span>
      </a>
      <a href="{{ url_for('admin.message_list') }}" class="sidebar-link{% if request.path.startswith('/admin/messages') %} active{% endif %}" aria-label="Messages">
        <i class="bi bi-envelope-fill" aria-hidden="true"></i>
        <span>Messages</span>
      </a>
      {% else %}
      <a href="#home" class="sidebar-link" data-section="home" aria-label="Home">
        <i class="bi bi-grid-1x2-fill" aria-hidden="true"></i>
        <span>Home</span>
      </a>
      <a href="#about" class="sidebar-link" data-section="about" aria-label="About">
        <i class="bi bi-person-badge" aria-hidden="true"></i>
        <span>About</span>
      </a>
      <a href="#skills" class="sidebar-link" data-section="skills" aria-label="Skills">
        <i class="bi bi-cpu-fill" aria-hidden="true"></i>
        <span>Skills</span>
      </a>
      <a href="#projects" class="sidebar-link" data-section="projects" aria-label="Projects">
        <i class="bi bi-diagram-3-fill" aria-hidden="true"></i>
        <span>Projects</span>
      </a>
      <a href="#experience" class="sidebar-link" data-section="experience" aria-label="Experience">
        <i class="bi bi-signpost-split-fill" aria-hidden="true"></i>
        <span>Experience</span>
      </a>
      <a href="#contact" class="sidebar-link" data-section="contact" aria-label="Contact">
        <i class="bi bi-broadcast" aria-hidden="true"></i>
        <span>Contact</span>
      </a>
      <div class="sidebar-meter" aria-hidden="true">
        <span class="meter-label">Energy</span>
        <div class="meter-track"><div class="meter-fill" id="sidebar-energy"></div></div>
      </div>
      {% endif %}
    </nav>    
  </div>
</aside>
